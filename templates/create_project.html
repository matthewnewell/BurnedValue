{% extends "layout.html" %}

{% block content %}
<div class="card form-card">
    <h2>🚀 Start New Project</h2>
    <form action="{{ url_for('create_project') }}" method="POST">
        <div class="form-group">
            <label>Project Name</label>
            <input type="text" name="name" required placeholder="e.g. Phoenix Protocol">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3" placeholder="Brief overview of project goals..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Contract Value ($)
                    <span class="tooltip-wrapper">
                        <span class="tooltip-icon">?</span>
                        <span class="tooltip-text">The total value of the contract — what the client pays. Set this higher than your Budget to create a Management Reserve that covers risks like scope growth.</span>
                    </span>
                </label>
                <input type="number" name="contract_value" step="0.01" placeholder="e.g. 275000">
            </div>
            <div class="form-group">
                <label>Budget at Completion (BAC) ($)
                    <span class="tooltip-wrapper">
                        <span class="tooltip-icon">?</span>
                        <span class="tooltip-text">Your planned spend. The gap between Contract Value and BAC is your Management Reserve — the buffer between a cost overrun and a contract breach.</span>
                    </span>
                </label>
                <input type="number" name="bac" required step="0.01" placeholder="e.g. 250000">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" name="start_date" required>
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date" name="end_date" required>
            </div>
        </div>

        <button type="submit" class="btn primary">Initialize Governance</button>
    </form>
</div>
{% endblock %}
