runtime: python312
instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 3
  target_cpu_utilization: 0.65

entrypoint: gunicorn -b : app:app

env_variables:
  FLASK_ENV: production
  DATA_DIR: /tmp/burned-value-data

handlers:
  - url: /static
    static_dir: static
  - url: /.*
    script: auto
