services:
  burnedvalue:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Project data persists here on the host — change the left side to any path you prefer
      - ./data:/app/data
    environment:
      FLASK_ENV: production
      SECRET_KEY: "change-me-in-production"

      # ── AI Provider ────────────────────────────────────────────────────────
      # Option A: Claude (cloud)
      #   AI_PROVIDER: claude
      #   AI_MODEL: claude-opus-4-5
      #   AI_API_KEY: sk-ant-...
      #
      # Option B: Ollama (on-premise)
      #   AI_PROVIDER: ollama
      #   AI_BASE_URL: http://ollama-host:11434
      #   AI_MODEL: llama3
      #
      # Leave as "none" to run without AI features
      AI_PROVIDER: "none"
      AI_BASE_URL: ""
      AI_MODEL: ""
      AI_API_KEY: ""
    restart: unless-stopped
